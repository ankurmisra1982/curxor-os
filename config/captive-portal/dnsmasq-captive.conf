# CurXor OS — Captive portal DNS/DHCP reference (Command Port only)
# Live config is generated by scripts/setup-captive-portal.sh — do not copy verbatim.
#
# Design: Command Port is an isolated management LAN. It does NOT hijack client
# internet. DHCP assigns addresses only; captive pop-up uses probe domains +
# iptables :80/:443 redirect (see config/captive-portal/captive-dns-domains.txt).

interface=enp98s0
bind-interfaces
except-interface=lo
except-interface=enp97s0

listen-address=10.0.0.1

dhcp-range=10.0.0.50,10.0.0.250,255.255.255.0,12h
# No option:router or option:dns-server — keeps dual-homed laptop internet working.

address=/captive.apple.com/10.0.0.1
address=/connectivitycheck.gstatic.com/10.0.0.1
address=/curxor.local/10.0.0.1

no-resolv
no-hosts
