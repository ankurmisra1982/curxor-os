# CurXor OS — Captive portal DNS/DHCP (dnsmasq on eno1 ONLY)
# Installed by /opt/curxor/scripts/setup-captive-portal.sh
# eno2 (robotics mesh) is explicitly excluded.

interface=eno1
bind-interfaces
except-interface=lo
except-interface=eno2

listen-address=10.0.0.1
bind-dynamic

# DHCP pool for connected clients (eno1 LAN)
dhcp-range=10.0.0.50,10.0.0.250,255.255.255.0,12h
dhcp-option=option:router,10.0.0.1
dhcp-option=option:dns-server,10.0.0.1

# Wildcard DNS capture — ALL names resolve to the appliance
address=/#/10.0.0.1

# Sovereign mode — do not forward DNS upstream
no-resolv
no-hosts

# Logging (optional, low volume)
log-queries
log-dhcp
