<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#141414" stroke-width="1"/>
    </pattern>
    <radialGradient id="heroGlow" cx="50%" cy="44%" r="42%">
      <stop offset="0%" stop-color="#BF5AF2" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#BF5AF2" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cmdBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BF5AF2" stop-opacity="0"/>
      <stop offset="18%" stop-color="#BF5AF2" stop-opacity="0.9"/>
      <stop offset="82%" stop-color="#BF5AF2" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#BF5AF2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="egressBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD60A" stop-opacity="0"/>
      <stop offset="18%" stop-color="#FFD60A" stop-opacity="0.85"/>
      <stop offset="82%" stop-color="#FFD60A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFD60A" stop-opacity="0"/>
    </linearGradient>
    <filter id="wordmarkGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="edgeL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="14%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edgeR" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="14%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1500" height="500" fill="#050505"/>
  <rect width="1500" height="500" fill="url(#grid)"/>
  <rect width="1500" height="500" fill="url(#heroGlow)"/>
  <rect width="1500" height="500" fill="url(#edgeL)"/>
  <rect width="1500" height="500" fill="url(#edgeR)"/>

  <!--
    X banner = brand stamp, not product diagram.
    Safe band: center x 350-1150, y 90-340 (mobile crop + avatar bottom-left)
  -->

  <!-- OS label above wordmark -->
  <text
    x="750"
    y="118"
    text-anchor="middle"
    font-family="JetBrains Mono, ui-monospace, monospace"
    font-size="13"
    font-weight="700"
    fill="#BF5AF2"
    letter-spacing="8"
  >OPERATING SYSTEM</text>

  <!-- curXor hardware wordmark (centered hero) -->
  <g transform="translate(750 248)" filter="url(#wordmarkGlow)">
    <g transform="translate(-385 -58) scale(0.92)">
      <g transform="translate(65 100)">
        <g transform="scale(1.2)">
          <rect x="-22" y="-22" width="44" height="44" rx="8" transform="rotate(45) translate(8, 8)" fill="#BF5AF2"/>
          <rect x="-22" y="-22" width="44" height="44" rx="8" transform="rotate(45)" fill="#ffffff"/>
        </g>
      </g>
      <text x="140" y="140" font-family="JetBrains Mono, ui-monospace, monospace" font-size="110" font-weight="800" fill="#ffffff" letter-spacing="-5">cur</text>
      <g transform="translate(418 45)">
        <path d="M 10 0 L 55 100 L 30 100 L -15 0 Z" fill="#BF5AF2"/>
        <path d="M 40 0 L 85 100 L 60 100 L 15 0 Z" fill="#BF5AF2"/>
        <path d="M 105 0 C 70 30 20 70 -20 100 L 5 100 C 45 70 95 30 130 0 Z" fill="#BF5AF2"/>
      </g>
      <text x="548" y="140" font-family="JetBrains Mono, ui-monospace, monospace" font-size="110" font-weight="800" fill="#ffffff" letter-spacing="-5">or</text>
      <rect x="686" y="65" width="12" height="75" fill="#BF5AF2"/>
    </g>
  </g>

  <!-- dual-port architecture hint (abstract, not diagram) -->
  <g transform="translate(750 328)">
    <rect x="-280" y="-10" width="560" height="2" rx="1" fill="url(#cmdBar)"/>
    <rect x="-280" y="10" width="560" height="2" rx="1" fill="url(#egressBar)"/>
    <text x="-290" y="-4" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#BF5AF2" letter-spacing="1">EN01</text>
    <text x="-290" y="16" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#FFD60A" letter-spacing="1">EN02</text>
    <text x="290" y="-4" text-anchor="start" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#555" letter-spacing="1">COMMAND</text>
    <text x="290" y="16" text-anchor="start" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#555" letter-spacing="1">EGRESS</text>
  </g>

  <!-- payoff + product truth -->
  <text
    x="750"
    y="378"
    text-anchor="middle"
    font-family="JetBrains Mono, ui-monospace, monospace"
    font-size="15"
    font-weight="700"
    fill="#6a6a6a"
    letter-spacing="3"
  >THE ORCHESTRATOR ON YOUR DESK</text>
  <text
    x="750"
    y="408"
    text-anchor="middle"
    font-family="JetBrains Mono, ui-monospace, monospace"
    font-size="11"
    fill="#3f3f3f"
    letter-spacing="2"
  >TEN CLAWS  /  LOCAL INFERENCE  /  SOVEREIGN METAL</text>

  <!-- subtle corner stamp (brand, not clutter) -->
  <text
    x="1468"
    y="478"
    text-anchor="end"
    font-family="JetBrains Mono, ui-monospace, monospace"
    font-size="9"
    fill="#2a2a2a"
    letter-spacing="2"
  >CURXOR OS 0.9.1</text>
</svg>
