name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "24"

jobs:
  pillar-2-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pillar-2-engine
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pillar-2-engine/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  pillar-4-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pillar-4-dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pillar-4-dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          CURXOR_MESH_BROKER_IP: 127.0.0.1
          CURXOR_FRE_STATE_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/fre-state.json
          CURXOR_APP_FRE_DIR: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/app-fre

  pillar-4-qa-smoke:
    runs-on: ubuntu-latest
    needs: pillar-4-dashboard
    defaults:
      run:
        working-directory: pillar-4-dashboard
    env:
      CURXOR_DEV_QA_DIR: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa
      CURXOR_MESH_BROKER_IP: 127.0.0.1
      CURXOR_FRE_STATE_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/fre-state.json
      CURXOR_USER_SETTINGS_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/user-settings.json
      CURXOR_LLM_CREDENTIALS_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/llm-credentials.json
      CURXOR_CLAW_CONTEXT_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/claw-context.json
      CURXOR_FAMILY_PROFILES_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/family-profiles.json
      CURXOR_HUMANOID_HUB_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/humanoid-hub.json
      CURXOR_VITAL_STATE_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/vital-health.json
      CURXOR_CONTENT_QUEUE_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/content-queue.json
      CURXOR_WORK_QUEUE_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/work-queue.json
      CURXOR_WORK_OUTBOUND_LOCK: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/work-outbound.lock
      CURXOR_CAPITAL_QUEUE_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/capital-queue.json
      CURXOR_CAPITAL_PFM_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/capital-pfm.json
      CURXOR_CAPITAL_INTEL_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/capital-intel.json
      CURXOR_CAPITAL_PLAID_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/capital-plaid.json
      CURXOR_CAPITAL_SNAPTRADE_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/capital-snaptrade.json
      CURXOR_DIGITAL_ENV_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/digital.env
      CURXOR_PROVIDER_LINK_SESSIONS_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/provider-link-sessions.json
      CURXOR_CLAW_PROFILES_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/claw-profiles.json
      CURXOR_APP_FRE_DIR: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/app-fre
      CURXOR_AGENT_WORKSPACE_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/agent-workspace
      CURXOR_FORGED_APPS_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/forged-apps.json
      CURXOR_SCHEDULER_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/scheduler/jobs.json
      CURXOR_CHANNELS_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/channels
      CURXOR_CCP_CONSENT_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/ccp-consent.json
      CURXOR_GARMIN_OAUTH_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/garmin-oauth.json
      CURXOR_CONTENT_AUDIT_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/content-audit.json
      CURXOR_BRIDGE_HEALTH_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/content-bridge-health.json
      CURXOR_CONTENT_OPS_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/content-ops.json
      CURXOR_COMMERCE_SHOPIFY_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/commerce-shopify.json
      CURXOR_COMMERCE_EBAY_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/commerce-ebay.json
      CURXOR_COMMERCE_PRINTIFY_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/commerce-printify.json
      CURXOR_SHOP_SYNC_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/shop-sync.json
      CURXOR_SIGNAL_FEED_PATH: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/signal-feed.json
      CURXOR_ACTIVE_CLAW_CONF: ${{ github.workspace }}/pillar-4-dashboard/scripts/dev-qa/engine.env.d/active-claw.conf
      CURXOR_SHOPIFY_MOCK: "1"
      CURXOR_EBAY_MOCK: "1"
      CURXOR_PRINTIFY_MOCK: "1"
      PORT: "3080"
      HOSTNAME: 127.0.0.1
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pillar-4-dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Prepare QA state
        run: node scripts/ci-prepare-qa.mjs
      - name: Build production bundle
        run: npm run build
      - name: Start production server
        run: npm run start &
      - name: Wait for server
        run: node scripts/wait-for-server.mjs http://127.0.0.1:3080 90000
      - name: QA smoke tests
        run: npm run qa:smoke
